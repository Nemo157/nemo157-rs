version: 2.1

orbs:
  rust: nemo157/rust@dev:alpha

workflows:
  version: 2.1
  test:
    jobs:
    - rust/check
    - rust/fmt
    - rust/build:
        requires:
        - rust/check
    - rust/clippy:
        requires:
        - rust/check
    - rust/test:
        requires:
        - rust/build
    - rust/test:
        toolchain: nightly
        minimal-versions: true
        attach-workspace: false
        requires:
        - rust/check
