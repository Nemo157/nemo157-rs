version: 2.1

orbs:
  rust: nemo157/rust@dev:alpha

executors:
  rust:
    docker:
    - image: circleci/rust:latest

jobs:
  test:
    executor: rust
    steps:
    - checkout
    - attach_workspace:
        at: target
    - run:
        command: cargo test

  minimal:
    executor: rust
    steps:
    - checkout
    - run:
        command: rustup default nightly
    - run:
        command: cargo update -Z minimal-versions
    - run:
        command: cargo test

  fmt:
    executor: rust
    steps:
    - checkout
    - run:
        command: rustup component add rustfmt
    - run:
        command: cargo fmt --all -- --check

  clippy:
    executor: rust
    steps:
    - checkout
    - attach_workspace:
        at: target
    - run:
        command: rustup component add clippy
    - run:
        command: cargo clippy --all --all-targets -- -D warnings

workflows:
  version: 2.1
  test:
    jobs:
    - rust/build
    - test:
        requires:
        - rust/build
    - minimal
    - fmt
    - clippy:
        requires:
        - rust/build
